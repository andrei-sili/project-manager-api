# Production stack for the API host (e.g. api.andreisili.com):
# PostgreSQL + Redis + Django/ASGI (Daphne) behind Caddy (automatic HTTPS).
# The Next.js frontend is deployed separately on Vercel.
#
# Usage on the server:
#   cp deploy/.env.prod.example .env   # fill in the values
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-projectmanager}
      POSTGRES_USER: ${DATABASE_USER:-projectmanager}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-projectmanager}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: .
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      # localhost/127.0.0.1 let the in-container healthcheck reach Django;
      # external traffic always arrives as ${API_DOMAIN} via Caddy.
      ALLOWED_HOSTS: ${API_DOMAIN:?set API_DOMAIN in .env},localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: https://${FRONTEND_DOMAIN:?set FRONTEND_DOMAIN in .env}
      CORS_ALLOWED_ORIGINS: https://${FRONTEND_DOMAIN}
      CHANNELS_ALLOWED_ORIGINS: https://${FRONTEND_DOMAIN}
      FRONTEND_URL: https://${FRONTEND_DOMAIN}
      # Caddy terminates TLS and forwards over HTTP internally; it sets
      # X-Forwarded-Proto, which SECURE_PROXY_SSL_HEADER trusts. Caddy itself
      # redirects HTTP->HTTPS, so Django's own SSL redirect stays off.
      SECURE_SSL_REDIRECT: "false"
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME:-projectmanager}
      DATABASE_USER: ${DATABASE_USER:-projectmanager}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  media:
  caddy_data:
  caddy_config:
