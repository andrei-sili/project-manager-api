# Full local stack: PostgreSQL + Redis + Django (ASGI) + Next.js.
# Usage: cp .env.example .env  (set SECRET_KEY), then `docker compose up --build`.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-projectmanager}
      POSTGRES_USER: ${DATABASE_USER:-projectmanager}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-projectmanager}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-projectmanager}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine

  backend:
    build: .
    environment:
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:-insecure-compose-key-change-me-please-0123456789}
      SECURE_SSL_REDIRECT: "false"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME:-projectmanager}
      DATABASE_USER: ${DATABASE_USER:-projectmanager}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-projectmanager}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  media:
